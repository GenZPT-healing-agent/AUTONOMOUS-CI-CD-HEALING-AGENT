# ── Render Blueprint — Infrastructure as Code ──────────────────────────────
#
# This file declares the backend web service so that Render's build and
# start commands are version-controlled, not configured ad-hoc in the
# dashboard.
#
# The frontend is deployed separately on Vercel (see vercel.json).
# ───────────────────────────────────────────────────────────────────────────

services:
  - type: web
    name: autonomous-ci-cd-healing-agent
    runtime: node
    region: oregon

    # ── Build ──
    # Install ALL dependencies (including devDependencies for type-checking),
    # then run the backend-specific build step.
    # Setting NODE_ENV during install ensures tsx (now in dependencies) is
    # always available, while devDeps are installed only at build time.
    buildCommand: npm install && npm run build:server

    # ── Start ──
    # tsx is a production dependency — it runs TypeScript directly at the
    # Node.js loader level without a separate compile step.
    startCommand: npm run start

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8080"
      - key: CORS_ALLOWED_ORIGINS
        value: https://autonomous-ci-cd-healing-agent.vercel.app
      - key: DATABASE_URL
        sync: false          # must be set manually in Render dashboard
      - key: GITHUB_TOKEN
        sync: false          # must be set manually in Render dashboard
      - key: AGENT_RETRY_LIMIT
        value: "5"
