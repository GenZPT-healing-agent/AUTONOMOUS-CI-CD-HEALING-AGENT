# ── Render Blueprint — Infrastructure as Code ──────────────────────────────
#
# This file declares the backend web service so that Render's build and
# start commands are version-controlled, not configured ad-hoc in the
# dashboard.
#
# The frontend is deployed separately on Vercel (see vercel.json).
# ───────────────────────────────────────────────────────────────────────────

services:
  - type: web
    name: autonomous-ci-cd-healing-agent
    runtime: node
    region: oregon

    # ── Build ──
    # Deterministic CI install from lockfile + explicit backend compilation.
    buildCommand: npm ci && npm run build:server

    # ── Start ──
    # Start compiled JavaScript only (no runtime TypeScript transpilation).
    startCommand: npm start

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8080"
      - key: CORS_ALLOWED_ORIGINS
        value: https://autonomous-ci-cd-healing-agent.vercel.app
      - key: DATABASE_URL
        sync: false          # must be set manually in Render dashboard
      - key: GITHUB_TOKEN
        sync: false          # must be set manually in Render dashboard
      - key: REDIS_URL
        sync: false          # must be set manually in Render dashboard
      - key: AGENT_RETRY_LIMIT
        value: "5"
